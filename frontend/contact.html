<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact Support | EventFlow</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header class="topnav">
    <div class="brand">
      <span class="brand-icon">🚀</span>
      <span class="brand-name">EventFlow</span>
    </div>

    <nav class="topnav-links">
      <a href="welcome.html">Dashboard</a>
      <a href="events.html">All Events</a>
      <a href="teams.html">Teams</a>
      <a href="admin.html">Admin</a>
      <a href="contact.html">Contact</a>
    </nav>

    <div class="topnav-actions">
      <button class="btn btn-secondary" onclick="window.location.href='welcome.html'">← Back</button>
      <button class="btn btn-logout" onclick="window.location.href='index.html'" style="background: rgba(255, 75, 75, 0.15); color: #ff4b4b; border: 1px solid rgba(255, 75, 75, 0.3);">Logout</button>
    </div>
  </header>

  <main class="main-grid">
    <section class="card">
      <div class="section-header">
        <div>
          <h2>Send us a message</h2>
          <p style="color: var(--muted); margin: 0;">
            Need help? Fill the form and we’ll reply asap.
          </p>
        </div>
      </div>

      <div class="contact-wrapper">
        <div class="contact-info">
          <div class="info-item">
            <div class="icon-glow"><i data-lucide="mail"></i></div>
            <div>
              <h4>Email</h4>
              <p>support@eventflow.example</p>
            </div>
          </div>
          <div class="info-item">
            <div class="icon-glow"><i data-lucide="phone"></i></div>
            <div>
              <h4>Phone</h4>
              <p>+1 (555) 123‑4567</p>
            </div>
          </div>
        </div>

        <div class="contact-form">
          <h3>Message box</h3>

          <form id="contactForm">
            <div class="input-group">
              <label for="contact-name">Your name</label>
              <input id="contact-name" type="text" required />
            </div>

            <div class="input-group">
              <label for="contact-email">Email</label>
              <input id="contact-email" type="email" required />
            </div>

            <div class="input-group">
              <label for="contact-message">Message</label>
              <textarea id="contact-message" rows="5" required></textarea>
            </div>

            <button class="btn btn-primary" type="submit">Send message</button>
          </form>
        </div>
      </div>
    </section>

    <!-- dashboard cards / live programs / event list -->
  </main>
  <footer class="site-footer">
  <div class="footer-content">
    <p>Thanks for using EventFlow — stay connected!</p>
    <div class="social-links">
      <a href="#" aria-label="Twitter"><i data-lucide="twitter"></i></a>
      <a href="#" aria-label="GitHub"><i data-lucide="github"></i></a>
      <a href="#" aria-label="LinkedIn"><i data-lucide="linkedin"></i></a>
    </div>
  </div>

  <p class="footer-note">© 2026 EventFlow. Built with ❤️.</p>
</footer>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>

  <script>
    lucide.createIcons();
    document.getElementById("contactForm").onsubmit = (e) => {
      e.preventDefault();
      alert("Message sent! We’ll get back to you shortly.");
    };
  </script>
</body>
</html>
