<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventFlow • Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div class="modal" style="background: transparent; position: relative; min-height: 100vh;">
    <div class="modal-content" style="margin: auto;">
      <div class="brand" style="justify-content: center; margin-bottom: 2rem;">
        <span class="brand-icon">🚀</span>
        <span class="brand-name">EventFlow</span>
      </div>

      <h2 style="text-align: center; margin-bottom: 1.5rem;">Create your account</h2>

      <form id="registerForm" class="contact-form" style="background: transparent; border: none; padding: 0; box-shadow: none;">
        <div class="input-group">
          <label for="reg-user">Username</label>
          <input type="text" id="reg-user" placeholder="Choose a username" required />
        </div>
        <div class="input-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="email@example.com" required />
        </div>
        <div class="input-group">
          <label for="reg-pass">Password</label>
          <input type="password" id="reg-pass" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn btn-primary full-width" style="margin-top: 1rem;">
          Register Now
        </button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; color: var(--muted);">
        Already have an account? <a href="login.html" style="color: var(--accent); font-weight: 700;">Login</a>
      </p>
    </div>
  </div>

  <script>
   document.getElementById('registerForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const name = document.getElementById('reg-user').value;
  const email = document.getElementById('reg-email').value;

  // Save user data to LocalStorage for the login check
  localStorage.setItem('registeredUser', name);
  localStorage.setItem('registeredEmail', email);

  alert('Registration successful! Redirecting to login...');
  window.location.href = 'login.html';
});
  </script>
</body>
</html>
