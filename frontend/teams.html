<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teams</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .main-grid {
      display: grid;
      gap: 20px;
      padding: 20px;
    }

    /* Navigation bar */
    .topnav-links {
      display: flex;
      gap: 20px;
      background: #fff;
      padding: 12px 20px;
      border-bottom: 1px solid #ddd;
    }
    .topnav-links a {
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }
    .topnav-links a.active {
      color: #007bff;
      border-bottom: 2px solid #007bff;
    }
    .topnav-actions {
      display: flex;
      gap: 10px;
      padding: 10px 20px;
      background: #fafafa;
      border-bottom: 1px solid #ddd;
    }

    /* Cards */
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .section-header h2 {
      margin: 0;
    }
    .muted {
      color: #666;
    }

    /* Form */
    .form-grid {
      display: grid;
      gap: 12px;
    }
    .form-grid label {
      font-weight: bold;
      color: #444;
    }
    .form-grid input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    /* Buttons */
    .btn {
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary {
      background: #007bff;
      color: #fff;
      border: none;
    }
    .btn-primary:hover { background: #0056b3; }
    .btn-secondary {
      background: #eee;
      border: 1px solid #ccc;
    }
    .btn-secondary:hover { background: #ddd; }
    .btn-logout {
      background: rgba(255, 75, 75, 0.15);
      color: #ff4b4b;
      border: 1px solid rgba(255, 75, 75, 0.3);
    }

    /* Table */
    .table-container { overflow-x: auto; }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
    }
    .admin-table th, .admin-table td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: center;
    }
    .admin-table th {
      background: #007bff;
      color: #fff;
    }
    .admin-table tr:nth-child(even) { background: #f9f9f9; }

    /* Action buttons */
    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .btn-approve {
      background: #28a745;
      color: #fff;
      border: none;
    }
    .btn-approve:hover { background: #1e7e34; }
    .btn-reject {
      background: #dc3545;
      color: #fff;
      border: none;
    }
    .btn-reject:hover { background: #a71d2a; }

    /* Status badge */
    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge.pending { background: #ffc107; color: #333; }
    .badge.approved { background: #28a745; color: #fff; }
    .badge.rejected { background: #dc3545; color: #fff; }

    /* Footer */
    .site-footer {
      background: #fff;
      padding: 20px;
      text-align: center;
      border-top: 1px solid #ddd;
    }
    .footer-note {
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="topnav-links">
      <a href="welcome.html">Dashboard</a>
      <a href="events.html">All Events</a>
      <a href="teams.html" class="active">Teams</a>
      <a href="admin.html">Admin</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="topnav-actions">
      <button class="btn btn-secondary" onclick="window.location.href='welcome.html'">← Back</button>
      <button class="btn btn-logout" onclick="window.location.href='index.html'">Logout</button>
    </div>
  </header>

  <main class="main-grid">
    <!-- Registration Form -->
    <section class="card">
      <div class="section-header">
        <div>
          <h2>Register a New Team</h2>
          <p class="muted">Fill in the details to add your team to the event.</p>
        </div>
      </div>
      <form id="teamForm" class="form-grid">
        <label>Team Name</label>
        <input type="text" id="teamName" required />
        <label>Members (comma separated)</label>
        <input type="text" id="members" required />
        <label>Captain</label>
        <input type="text" id="captain" required />
        <label>Contact Email</label>
        <input type="email" id="email" required />
        <button type="submit" class="btn btn-primary">Register Team</button>
      </form>
    </section>

    <!-- Registered Teams Table -->
    <section class="card table-container">
      <div class="table-header">
        <h2>Registered Teams</h2>
        <input type="text" id="searchTable" placeholder="Filter teams..." />
      </div>
      <table class="admin-table">
        <thead>
          <tr>
            <th>Team Name</th>
            <th>Members</th>
            <th>Captain</th>
            <th>Email</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="teamTableBody"></tbody>
      </table>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p>Thanks for using EventFlow — stay connected!</p>
      <div class="social-links">
        <a href="#" aria-label="Twitter"><i data-lucide="twitter"></i></a>
        <a href="#" aria-label="GitHub"><i data-lucide="github"></i></a>
        <a href="#" aria-label="LinkedIn"><i data-lucide="linkedin"></i></a>
      </div>
    </div>
    <p class="footer-note">© 2026 EventFlow. Built with ❤️.</p>
  </footer>

  <script>
    const form = document.getElementById('teamForm');
    const tableBody = document.getElementById('teamTableBody');
    const searchInput = document.getElementById('searchTable');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const teamName = document.getElementById('teamName').value.trim();
      const members = document.getElementById('members').value.trim();
      const captain = document.getElementById('captain').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!teamName || !members || !captain || !email) {
        alert("Please fill in all fields.");
        return;
      }

      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${teamName}</td>
        <td>${members}</td>
        <td>${captain}</td>
        <td>${email}</td>
        <td><span class="badge pending">Pending</span></td>
        <td>
          <div class="action-buttons">
            <button class="btn btn-approve" onclick="approveTeam(this)">Approve</button>
            <button class="btn btn-reject" onclick="rejectTeam(this)">Reject</button>
          </div>
        </td>
      `;
      tableBody.appendChild(row);
      form.reset();
    });

    searchInput.addEventListener('keyup', function() {
      const filter = searchInput.value
