<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teams</title>
  <link rel="stylesheet" href="teams.css">
</head>
<body>
  <header class="site-header">
    <div class="navbar">
      <div class="logo">
        <i class="rocket-icon"></i>
        <span class="brand">EventFlow</span>
      </div>
      <nav class="topnav-links">
        <a href="welcome.html">Dashboard</a>
        <a href="events.html">All Events</a>
        <a href="teams.html" class="active">Teams</a>
        <a href="admin.html">Admin</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="topnav-actions">
        <button class="btn btn-secondary" id="backBtn">← Back</button>
        <button class="btn btn-logout" id="logoutBtn">Logout</button>
      </div>
    </div>
  </header>

  <main class="main-grid">
    <!-- Registration Form -->
    <section class="card">
      <div class="section-header">
        <h2>Register a New Team</h2>
        <p class="muted">Fill in the details to add your team to the event.</p>
      </div>
      <form id="teamForm" class="form-grid">
        <label>Team Name</label>
        <input type="text" id="teamName" required />
        <label>Members (comma separated)</label>
        <input type="text" id="members" required />
        <label>Captain</label>
        <input type="text" id="captain" required />
        <label>Contact Email</label>
        <input type="email" id="email" required />
        <button type="submit" class="btn btn-primary">Register Team</button>
      </form>
    </section>

    <!-- Registered Teams Table -->
    <section class="card table-container">
      <div class="table-header">
        <h2>Registered Teams</h2>
        <input type="text" id="searchTable" placeholder="Filter teams..." />
      </div>
      <table class="admin-table">
        <thead>
          <tr>
            <th>Team Name</th>
            <th>Members</th>
            <th>Captain</th>
            <th>Email</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="teamTableBody"></tbody>
      </table>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 EventFlow. Built with ❤️.</p>
  </footer>

  <script src="teams.js" defer></script>
</body>
</html>
